name: Trigger Card

on:
  schedule:
    # 北京时间 = UTC - 8
    # 14:30 北京 = UTC 06:30（次日）
    # 09:30 北京 = UTC 01:30（次日）
    # 当前 UTC 时间段: 加一个近期测试cron
    - cron: '25 7 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/daily-card.yml/dispatches \
            -d '{"ref":"main"}'
