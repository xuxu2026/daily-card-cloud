name: Trigger Card

on:
  schedule:
    # 北京时间 = UTC - 8
    # 14:30 北京 = UTC 06:30（次日）
    # 14:35 北京 = UTC 06:35（次日，保底）
    - cron: '30 6 * * *'
    - cron: '35 6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/daily-card.yml/dispatches \
            -d '{"ref":"main"}'
