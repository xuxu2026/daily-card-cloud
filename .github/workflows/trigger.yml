name: Trigger Card

on:
  schedule:
    # 北京时间 = UTC + 8
    # 北京 01:00 = UTC 17:00 ← 每日兜底触发（如主 schedule 失败则手动补跑）
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/daily-card.yml/dispatches \
            -d '{"ref":"main"}'
