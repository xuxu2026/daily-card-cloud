name: Trigger Card

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-card workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import requests
          import datetime
          import os

          TOKEN = os.environ['GITHUB_TOKEN']
          REPO = os.environ['GITHUB_REPOSITORY']

          headers = {
              'Authorization': 'token ' + TOKEN,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
          }

          # 获取 daily-card workflow ID
          wf_url = f'https://api.github.com/repos/{REPO}/actions/workflows'
          r = requests.get(wf_url, headers=headers)
          workflows = r.json().get('workflows', [])
          wf_id = None
          for wf in workflows:
              if 'daily-card' in wf.get('path', '') or wf.get('name') == 'Daily Card':
                  wf_id = wf['id']
                  print(f"Found workflow: {wf['name']} (ID: {wf_id})")
                  break

          if not wf_id:
              print('Workflow not found!')
              exit(1)

          # 触发 workflow_dispatch
          bj_now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8)))
          disp_url = f'https://api.github.com/repos/{REPO}/actions/workflows/{wf_id}/dispatches'
          r = requests.post(disp_url, headers=headers, json={'ref': 'main', 'inputs': {}})
          print(f'Dispatch status: {r.status_code}')
          print(f'Response: {r.text[:300]}')
          if r.status_code not in (200, 204):
              exit(1)
          print('SUCCESS: daily-card workflow triggered!')
          PYEOF
