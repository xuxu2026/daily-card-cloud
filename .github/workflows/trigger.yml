name: Trigger Card

on:
  schedule:
    # 北京时间 = UTC - 8，所以 14:30 北京 = UTC 06:30（次日）
    # 测试用 15:05 北京 = UTC 07:05（当前时区下更近的测试点）
    # 正式用 cron: '30 22 * * *' => 06:30 UTC = 14:30 北京时间
    - cron: '5 7 * * *'
    - cron: '10 7 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/daily-card.yml/dispatches \
            -d '{"ref":"main"}'
