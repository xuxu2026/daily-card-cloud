name: Trigger Card

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-card workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import requests
          import datetime
          import os

          TOKEN = os.environ['GITHUB_TOKEN']
          REPO = os.environ['GITHUB_REPOSITORY']

          headers = {
              'Authorization': 'token ' + TOKEN,
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
          }

          # daily-card workflow ID (固定值)
          WF_ID = '256176970'

          # 触发 workflow_dispatch
          disp_url = f'https://api.github.com/repos/{REPO}/actions/workflows/{WF_ID}/dispatches'
          r = requests.post(disp_url, headers=headers, json={'ref': 'main', 'inputs': {}})
          print(f'Dispatch status: {r.status_code}')
          print(f'Response: {r.text[:300]}')
          if r.status_code not in (200, 204):
              exit(1)
          print('SUCCESS: daily-card workflow triggered!')
          PYEOF
