name: Trigger Card

on:
  schedule:
    # 北京时间 09:00 = UTC 01:00 ← 每日主推送
    - cron: '0 1 * * *'
    # 北京时间 14:06 = UTC 06:06（延迟6分钟）
    - cron: '6 6 * * *'
    # 北京时间 14:35 = UTC 06:35（延迟6分钟）
    - cron: '35 6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily-card workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/daily-card.yml/dispatches \
            -d '{"ref":"main"}'
      - name: Trigger test-card workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/test-card.yml/dispatches \
            -d '{"ref":"main"}'
