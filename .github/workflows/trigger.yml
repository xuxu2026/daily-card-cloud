name: Trigger Card

on:
  schedule:
    # 北京时间 = UTC + 8
    # 北京 16:08 = UTC 08:08 ← 立即测试用
    - cron: '8 8 * * *'
    # 北京 01:00 = UTC 17:00 ← 每日正式推送
    - cron: '0 17 * * *'
    # 明天 14:30 北京 = UTC 06:30
    - cron: '30 6 * * *'
    # 明天 14:35 北京 = UTC 06:35（保底）
    - cron: '35 6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main workflow
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/daily-card.yml/dispatches \
            -d '{"ref":"main"}'
