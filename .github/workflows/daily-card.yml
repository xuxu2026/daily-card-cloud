name: Daily Card

on:
  schedule:
    # 每天早上 9:30 北京时间 = UTC 1:30
    - cron: '30 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml

      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps

      - name: Set timezone to China Standard Time
        run: |
          tzutil /s "China Standard Time"
          $env:TZ = "Asia/Shanghai"

      - name: Diagnostic - Test WeChat API reachability
        run: |
          python -c "
import requests, os
url = 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=4a41bb57-cabb-4d9a-a7be-1d33064bf98b'
try:
    r = requests.post(url, json={'msgtype':'text','text':{'content':'🔔 云端网络诊断测试'}}, timeout=10)
    print('WECHAT_API_STATUS:', r.status_code)
    print('WECHAT_API_RESPONSE:', r.text)
except Exception as e:
    print('WECHAT_API_ERROR:', str(e))
"

      - name: Run daily card generator
        env:
          TZ: Asia/Shanghai
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
        run: python main.py
