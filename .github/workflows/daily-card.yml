name: Daily Card

on:
  schedule:
    # 每天早上 9:30 北京时间 = UTC 1:30
    - cron: '30 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  run:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml
          
      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps
          
      - name: Install Chinese fonts
        run: |
          # Download and install Microsoft YaHei (微软雅黑)
          $fontUrl = "https://github.com/microsoft/vscode/files/5262716/CJKFonts.zip"
          Invoke-WebRequest -Uri $fontUrl -OutFile "fonts.zip"
          Expand-Archive -Path "fonts.zip" -DestinationPath "$env:LOCALAPPDATA\Microsoft\Windows\Fonts" -Force
          
      - name: Run daily card generator
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
        run: python main.py
