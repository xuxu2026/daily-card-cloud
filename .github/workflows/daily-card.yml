name: Daily Card

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml

      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps

      - name: Set timezone
        run: |
          tzutil /s "China Standard Time"
          $env:TZ = "Asia/Shanghai"
      - name: Diagnostic - WeChat API
        run: |
          $pycode = @"
import requests
from datetime import datetime, timezone, timedelta
import os
import sys
sys.stdout = open(sys.stdout.fileno(), mode='w', encoding='utf-8', buffering=1)
bj_now = datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=8)))
msg = bj_now.strftime('%m月%d日') + '早安推送，请及时发布朋友圈'
webhook = os.environ.get('WECOM_WEBHOOK_URL','')
r = requests.post(webhook, json={'msgtype': 'text', 'text': {'content': '[云上夏天] ' + msg}}, timeout=10)
print('WECHAT_STATUS:', r.status_code)
"@
          $pycode | python


      - name: Run daily card generator
        env:
          TZ: Asia/Shanghai
          PYTHONIOENCODING: utf-8
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
        run: python main.py
