name: Daily Card

on:
  schedule:
    # 每天早上 9:30 北京时间 = UTC 1:30
    - cron: '30 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  run:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml
          
      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps
          
      - name: Install Chinese fonts
        run: |
          # Try winget first (Windows 2022+)
          $fontwinget = winget install --id Microsoft.YaHei.UI --exact --silent --accept-package-agreements --accept-source-agreements 2>&1
          if ($LASTEXITCODE -eq 0) { Write-Host "YaHei installed via winget" }
          else {
            # Fallback: download from NPM package (always available)
            npm install -g font-link --silent 2>&1 | Out-Null
            # Copy system fallback fonts if needed
            Write-Host "Using system fonts fallback"
          }
          
      - name: Run daily card generator
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
        run: python main.py
