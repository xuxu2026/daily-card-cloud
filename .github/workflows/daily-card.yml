name: Daily Card

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml

      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps

      - name: Set timezone
        run: |
          tzutil /s "China Standard Time"
          $env:TZ = "Asia/Shanghai"
      - name: Diagnostic - WeChat API
        env:
          PYTHONIOENCODING: utf-8
          MSG_BASE64: "5pep5a6J5o6o6YCB77yM6K+35Y+K5pe25Y+R5biD5pyL5Y+L5ZyI"
        run: |
          python -c "import base64,os; from datetime import datetime,timezone,timedelta; import requests; dt=datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=8))); msg=dt.strftime('%m')+'月'+dt.strftime('%d')+'日'+base64.b64decode(os.environ['MSG_BASE64']).decode('utf-8'); webhook=os.environ.get('WECOM_WEBHOOK_URL',''); r=requests.post(webhook,json={'msgtype':'text','text':{'content':'[云上夏天] '+msg}},timeout=10); print('WECHAT_STATUS:'+str(r.status_code))"
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}


      - name: Run daily card generator
        env:
          TZ: Asia/Shanghai
          PYTHONIOENCODING: utf-8
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
        run: python main.py
