name: Daily Card

on:
  schedule:
    # 每天 09:30 北京时间 = UTC 01:30
    - cron: '05 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml

      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps

      - name: Set timezone
        run: |
          tzutil /s "China Standard Time"
          $env:TZ = "Asia/Shanghai"

      - name: Diagnostic - WeChat API
        run: |
          python -c "import requests; r = requests.post('https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=4a41bb57-cabb-4d9a-a7be-1d33064bf98b', json={'msgtype':'text','text':{'content':'[云端诊断] 测试消息'}}, timeout=10); print('WECHAT_STATUS:', r.status_code, r.json())"

      - name: Run daily card generator
        env:
          TZ: Asia/Shanghai
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
        run: python main.py
2 UTC


      - name: Trigger cron-monitor workflow dispatch
        run: |
          echo "Triggering cron-monitor via workflow_dispatch..."
          curl -s -X POST \
            "https://api.github.com/repos/xuxu2026/daily-card-cloud/actions/workflows/cron-monitor.yml/dispatches" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"ref\":\"main\"}"
          echo "Done - cron-monitor triggered"
