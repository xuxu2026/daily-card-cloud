name: Daily Card

'on':
  workflow_dispatch:
  schedule:
    # 每天 9:30 AM 北京时间 = 01:30 UTC
    - cron: '30 1 * * *'
  push:
    paths:
      - '.trigger-marker'

jobs:
  run:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set timezone to Beijing
        uses: szenius/set-timezone@v1.2
        with:
          timezoneWindows: "China Standard Time"

      - name: Install dependencies
        run: |
          pip install playwright imgkit python-dateutil requests pillow beautifulsoup4 lxml

      - name: Install Playwright browsers
        run: |
          playwright install msedge --with-deps

      - name: Diagnostic - WeChat API
        env:
          PYTHONIOENCODING: utf-8
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          python -c "import requests, os; from datetime import datetime, timezone, timedelta; bj_now = datetime.now(timezone.utc).astimezone(timezone(timedelta(hours=8))); msg = bj_now.strftime('%m-%d') + ' Good morning push'; webhook = os.environ.get('WECOM_WEBHOOK_URL',''); r = requests.post(webhook, json={'msgtype': 'text', 'text': {'content': '[CloudSummer] ' + msg}}, timeout=10); print('WECHAT_STATUS:', r.status_code)"

      - name: Run daily card generator
        env:
          TZ: Asia/Shanghai
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CAIYUN_TOKEN: ${{ secrets.CAIYUN_TOKEN }}
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
        run: python main.py
