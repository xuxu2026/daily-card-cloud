name: Cron Monitor
on:
  workflow_dispatch:
  schedule:
    # 北京时间 17:50 = UTC 09:50（约11分钟后测试）
    - cron: '50 9 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Cron fired!
        run: |
          echo "Cron fired at $(date -u)"
          echo "This proves schedule triggers work in GitHub Actions"
