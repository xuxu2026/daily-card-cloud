name: Cron Monitor
on:
  schedule:
    # 北京时间 17:15 = UTC 09:15（测试用，09:00整点评估窗口注册）
    - cron: '15 9 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Cron fired!
        run: |
          echo "Cron fired at $(date -u)"
          echo "This proves schedule triggers work in GitHub Actions"
