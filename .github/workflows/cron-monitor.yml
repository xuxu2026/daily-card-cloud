name: Cron Monitor
on:
  schedule:
    # 北京时间 17:08 = UTC 09:08（等 49 分钟后测试）
    - cron: '8 9 * * *'
    # 北京时间 09:30 = UTC 01:30
    - cron: '30 1 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Cron fired!
        run: |
          echo "Cron fired at $(date -u)"
          echo "This proves schedule triggers work in GitHub Actions"
