name: Cron Monitor
on:
  workflow_dispatch:
  schedule:
    # 北京时间 18:25 = UTC 10:25（第二次测试）
    - cron: '25 10 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Cron fired!
        run: |
          echo "Cron fired at $(date -u)"
          echo "This proves schedule triggers work in GitHub Actions"
