name: Cron Monitor
on:
  workflow_dispatch:
  schedule:
    # 北京时间 19:05 = UTC 11:05（快速测试）
    - cron: '5 11 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Cron fired!
        run: |
          echo "Cron fired at $(date -u)"
          echo "This proves schedule triggers work in GitHub Actions"
