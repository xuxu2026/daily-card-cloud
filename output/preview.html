<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 750px;
    min-height: 1050px;
    background: linear-gradient(160deg,#fffef8,#fef8f0,#fdf0e8,#fce8e0,#fbe0d8,#fae0d0);
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    position: relative;
    overflow: hidden;
  }

  .decor {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 44px 38px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .greeting {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: rgba(122,90,66,0.55);
    letter-spacing: 8px;
    margin-bottom: 6px;
  }

  .date-label {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 32px;
    color: #8A6A50;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.10);
  }

  .weekday-badge {
    display: inline-block;
    background: linear-gradient(135deg, #B09070, #D0B090);
    color: #fff;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 3px;
    padding: 5px 20px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
  }

  .divider {
    text-align: center;
    margin: 18px 0 22px;
    color: rgba(122,90,66,0.55);
    font-size: 13px;
    letter-spacing: 10px;
    font-family: serif;
  }

  .poem-wrap {
    text-align: center;
    margin-bottom: 14px;
    padding: 14px 20px 12px;
    background: rgba(255,252,248,0.65);
    border-radius: 20px;
    border: 1px solid rgba(208,176,144,0.40);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  .poem-text {
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-size: 13px;
    font-weight: 400;
    color: #7A5A42;
    line-height: 2.2;
    letter-spacing: 2px;
    font-style: italic;
  }

  .poem-text + .poem-text {
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px dashed rgba(0,0,0,0.06);
  }

  .section-label {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: rgba(122,90,66,0.55);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }

  .weather-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  .city-card {
    background: rgba(255,252,248,0.65);
    border-radius: 20px;
    padding: 10px 8px 8px;
    text-align: center;
    border: 1px solid rgba(208,176,144,0.40);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }

  .city-name {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: rgba(122,90,66,0.55);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .temp-main {
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-size: 32px;
    font-weight: 700;
    color: #8A6A50;
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .temp-desc {
    font-size: 14px;
    font-weight: 400;
    color: rgba(122,90,66,0.55);
  }

  .weather-info {
    margin: 6px 0;
    padding: 4px 0;
    border-top: 1px dashed rgba(0,0,0,0.06);
    border-bottom: 1px dashed rgba(0,0,0,0.06);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    color: rgba(122,90,66,0.55);
    margin-bottom: 3px;
  }

  .info-row:last-child {
    margin-bottom: 0;
  }

  .info-label {
    font-weight: 500;
    color: rgba(122,90,66,0.55);
  }

  .info-value {
    color: #7A5A42;
  }

  .tips-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 8px;
  }

  .tip-item {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    color: rgba(122,90,66,0.55);
    letter-spacing: 0.5px;
  }

  .restriction-wrap {
    background: rgba(255,252,248,0.65);
    border-radius: 20px;
    padding: 10px 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(208,176,144,0.40);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }

  .restriction-title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: rgba(122,90,66,0.55);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }

  .r-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px dashed rgba(0,0,0,0.05);
  }

  .r-row:last-child { border-bottom: none; padding-bottom: 0; }

  .r-day {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 11px;
    color: rgba(122,90,66,0.55);
  }

  .r-num {
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-size: 12px;
    color: #8A6A50;
    font-weight: 600;
    background: rgba(208,176,144,0.25);
    padding: 3px 12px;
    border-radius: 14px;
  }

  .no-restriction {
    background: rgba(150,200,160,0.25);
    color: rgba(60,130,80,0.85);
  }

  .skincare-wrap {
    background: rgba(255,252,248,0.65);
    border-radius: 20px;
    padding: 10px 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(208,176,144,0.40);
    border-left: 3px solid #B09070;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.03);
  }

  .sk-title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: #B09070;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .sk-content {
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-size: 12px;
    color: #7A5A42;
    line-height: 1.9;
    letter-spacing: 0.8px;
  }

  .footer {
    text-align: center;
    padding-top: 8px;
  }

  .footer-ornament {
    color: rgba(122,90,66,0.55);
    font-size: 12px;
    letter-spacing: 14px;
    display: block;
    margin-bottom: 4px;
  }

  .footer-text {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 16px;
    color: rgba(122,90,66,0.55);
    letter-spacing: 4px;
  }

  .logo-wrap {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 100;
  }

  .logo-wrap img {
    max-height: 40px;
    max-width: 120px;
    object-fit: contain;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="decor">
    
    <svg viewBox="0 0 750 1050" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 80 Q80 50 110 80 Q140 110 170 80" stroke="rgba(176, 144, 112, 0.15)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M70 110 Q100 80 130 110 Q160 140 190 110" stroke="rgba(208, 176, 144, 0.1)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M600 950 Q630 920 660 950 Q690 980 720 950" stroke="rgba(208, 176, 144, 0.12)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M620 980 Q650 950 680 980 Q710 1010 740 980" stroke="rgba(176, 144, 112, 0.08)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="60" rx="50" ry="50" fill="rgba(176, 144, 112, 0.07)"/>
      <ellipse cx="710" cy="90" rx="45" ry="45" fill="rgba(208, 176, 144, 0.06)"/>
    </svg>
  </div>

  <div class="logo-wrap">
    <img src="file:///C:/Users/30286/WorkBuddy/20260403180838/daily-card/assets/夏天抗衰诊所透明背景LOGO.png" alt="logo">
  </div>

  <div class="container">
    <div class="header">
      <div class="greeting">早安</div>
      <div class="date-label">2026年04月03日</div>
      <div class="weekday-badge">周五</div>
    </div>

    <div class="divider">✿ · ✿</div>

    <div class="poem-wrap">
      <div class="poem-text">春水初生，春林初盛，春风十里，不如你。—— 冯唐</div>
      <div class="poem-text">愿你所有的清晨都明亮，所有的傍晚都温柔。</div>
    </div>

    <div class="section-label">今日天气</div>
    <div class="weather-grid">
        <div class="city-card">
            <div class="city-name">仁寿</div>
            <div class="temp-main">18° <span class="temp-desc">⛅ 多云</span></div>
            <div class="weather-info">
                <div class="info-row">
                    <span class="info-label">今日</span>
                    <span class="info-value">多云 14° ~ 22°</span>
                </div>
                <div class="info-row">
                    <span class="info-label">明日</span>
                    <span class="info-value">-- --° ~ --°</span>
                </div>
            </div>
            <div class="tips-row">
                <span class="tip-item">☀️ 紫外线 较弱</span>
                <span class="tip-item">👗 长袖</span>
            </div>
        </div>
        <div class="city-card">
            <div class="city-name">成都</div>
            <div class="temp-main">17° <span class="temp-desc">🌥️ 阴</span></div>
            <div class="weather-info">
                <div class="info-row">
                    <span class="info-label">今日</span>
                    <span class="info-value">阴 13° ~ 20°</span>
                </div>
                <div class="info-row">
                    <span class="info-label">明日</span>
                    <span class="info-value">-- --° ~ --°</span>
                </div>
            </div>
            <div class="tips-row">
                <span class="tip-item">☀️ 紫外线 弱</span>
                <span class="tip-item">👗 外套</span>
            </div>
        </div></div>

    <div class="restriction-wrap">
      <div class="restriction-title">成都限号</div>
      <div class="r-row">
        <span class="r-day">04月03日 周五</span>
        <span class="r-num ">尾号 5、0 限行</span>
      </div>
      <div class="r-row">
        <span class="r-day">04月04日 周六</span>
        <span class="r-num no-restriction">不限行</span>
      </div>
    </div>

    <div class="skincare-wrap">
      <div class="sk-title">✧ 今日护肤小贴士</div>
      <div class="sk-content">春季皮肤敏感期，换季时请先做局部测试再更换新护肤品。建议精简护肤步骤，以修护屏障为主。</div>
    </div>

    <div class="footer">
      <span class="footer-ornament">✿ · ✿</span>
      <div class="footer-text">奶油色调，温柔日常</div>
    </div>
  </div>
</body>
</html>
